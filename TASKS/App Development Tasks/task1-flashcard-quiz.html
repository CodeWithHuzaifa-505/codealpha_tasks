<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashMind – Flashcard Quiz App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --card: #1e1e28;
    --border: #2e2e40;
    --accent: #7c6fef;
    --accent2: #ef6f9a;
    --text: #e8e8f0;
    --muted: #7070a0;
    --green: #4ade80;
    --red: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; }
  
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:1.2rem 2rem; border-bottom:1px solid var(--border);
    background:rgba(14,14,18,0.9); backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:100;
  }
  .logo { font-size:1.4rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .stats { display:flex; gap:1.5rem; }
  .stat { font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--muted); }
  .stat span { color:var(--accent); font-weight:500; }

  main { max-width:900px; margin:0 auto; padding:2rem; }

  /* QUIZ MODE */
  #quizSection { display:block; }
  .progress-bar { background:var(--border); border-radius:99px; height:4px; margin-bottom:2rem; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; transition:width 0.4s ease; }
  
  .card-counter { text-align:center; font-family:'DM Mono',monospace; color:var(--muted); margin-bottom:1rem; font-size:0.85rem; }
  
  .flashcard-wrapper { perspective:1200px; margin:0 auto 2rem; width:100%; max-width:600px; height:320px; cursor:pointer; }
  .flashcard { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(.4,0,.2,1); }
  .flashcard.flipped { transform:rotateY(180deg); }
  .card-face {
    position:absolute; inset:0; border-radius:20px; padding:2.5rem;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    backface-visibility:hidden; border:1px solid var(--border);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .card-front { background:var(--card); }
  .card-back { background:linear-gradient(135deg,rgba(124,111,239,0.15),rgba(239,111,154,0.1)); transform:rotateY(180deg); }
  .card-label { font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
  .card-text { font-size:1.4rem; font-weight:600; text-align:center; line-height:1.5; }
  .flip-hint { margin-top:1.5rem; font-size:0.75rem; color:var(--muted); font-family:'DM Mono',monospace; }

  .btn-row { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem; }
  .btn {
    padding:0.7rem 1.8rem; border-radius:12px; border:none; cursor:pointer;
    font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:600; transition:all 0.2s;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#9580ff; transform:translateY(-2px); box-shadow:0 8px 20px rgba(124,111,239,0.4); }
  .btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:transparent; color:var(--red); border:1px solid var(--red); }
  .btn-danger:hover { background:var(--red); color:#fff; }
  .btn-success { background:var(--green); color:#000; }
  .btn-success:hover { background:#22c55e; transform:translateY(-2px); }

  /* MANAGE CARDS */
  #manageSection { display:none; }
  .section-title { font-size:1.5rem; font-weight:800; margin-bottom:1.5rem; }
  
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:2rem; }
  .form-card h3 { margin-bottom:1rem; font-size:1rem; color:var(--accent); font-family:'DM Mono',monospace; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .form-group { display:flex; flex-direction:column; gap:0.4rem; }
  label { font-size:0.8rem; color:var(--muted); font-family:'DM Mono',monospace; }
  input, textarea {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:0.7rem 1rem; color:var(--text); font-family:'Syne',sans-serif;
    font-size:0.9rem; outline:none; transition:border-color 0.2s; resize:vertical;
  }
  input:focus, textarea:focus { border-color:var(--accent); }
  textarea { min-height:80px; }

  .cards-list { display:grid; gap:0.8rem; }
  .card-item {
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:1rem 1.2rem; display:flex; align-items:center; gap:1rem; transition:border-color 0.2s;
  }
  .card-item:hover { border-color:var(--accent); }
  .card-item-content { flex:1; }
  .card-item-q { font-weight:600; font-size:0.95rem; margin-bottom:0.3rem; }
  .card-item-a { font-size:0.82rem; color:var(--muted); font-family:'DM Mono',monospace; }
  .card-item-actions { display:flex; gap:0.5rem; }
  .icon-btn {
    background:none; border:1px solid var(--border); border-radius:8px;
    padding:0.4rem 0.7rem; cursor:pointer; font-size:0.8rem; color:var(--muted); transition:all 0.2s;
  }
  .icon-btn:hover { border-color:var(--accent); color:var(--accent); }
  .icon-btn.del:hover { border-color:var(--red); color:var(--red); }

  .empty-state { text-align:center; padding:3rem; color:var(--muted); }
  .empty-state .emoji { font-size:3rem; margin-bottom:1rem; display:block; }

  /* EDIT MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border); border-radius:20px;
    padding:2rem; width:90%; max-width:500px; animation:fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .modal h3 { margin-bottom:1.5rem; font-size:1.1rem; }
  .modal-actions { display:flex; gap:0.8rem; justify-content:flex-end; margin-top:1.5rem; }

  .nav-tabs { display:flex; gap:0.5rem; margin-bottom:0; background:var(--surface); border-radius:12px; padding:0.4rem; width:fit-content; }
  .tab-btn { padding:0.5rem 1.2rem; border-radius:8px; border:none; cursor:pointer; font-family:'Syne',sans-serif; font-weight:600; font-size:0.85rem; transition:all 0.2s; background:none; color:var(--muted); }
  .tab-btn.active { background:var(--accent); color:#fff; }

  .top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
</style>
</head>
<body>
<header>
  <div class="logo">⚡ FlashMind</div>
  <div class="stats">
    <div class="stat">Cards: <span id="totalCount">0</span></div>
    <div class="stat">Session: <span id="sessionStat">0/0</span></div>
  </div>
</header>

<main>
  <div class="top-row">
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="switchTab('quiz')">Quiz Mode</button>
      <button class="tab-btn" onclick="switchTab('manage')">Manage Cards</button>
    </div>
  </div>

  <!-- QUIZ SECTION -->
  <div id="quizSection">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="card-counter" id="cardCounter">Card 1 of 5</div>
    <div class="flashcard-wrapper" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-label">Question</div>
          <div class="card-text" id="questionText">Loading...</div>
          <div class="flip-hint">Click to reveal answer →</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">Answer</div>
          <div class="card-text" id="answerText">...</div>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="prevCard()">← Previous</button>
      <button class="btn btn-primary" onclick="showAnswer()">Show Answer</button>
      <button class="btn btn-outline" onclick="nextCard()">Next →</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="markKnown()">✓ Know it</button>
      <button class="btn btn-danger" onclick="markUnknown()">✗ Review Again</button>
      <button class="btn btn-outline" onclick="shuffleCards()">⟳ Shuffle</button>
    </div>
    <div id="completedMsg" style="display:none; text-align:center; padding:2rem;">
      <div style="font-size:3rem; margin-bottom:1rem;">🎉</div>
      <div style="font-size:1.5rem; font-weight:700; margin-bottom:0.5rem;">Round Complete!</div>
      <div style="color:var(--muted); margin-bottom:1.5rem; font-family:'DM Mono',monospace;" id="scoreMsg"></div>
      <button class="btn btn-primary" onclick="restartQuiz()">Start Over</button>
    </div>
  </div>

  <!-- MANAGE SECTION -->
  <div id="manageSection">
    <div class="form-card">
      <h3>// ADD NEW FLASHCARD</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Question (Front)</label>
          <textarea id="newQ" placeholder="Enter question..."></textarea>
        </div>
        <div class="form-group">
          <label>Answer (Back)</label>
          <textarea id="newA" placeholder="Enter answer..."></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addCard()">+ Add Card</button>
    </div>

    <div class="section-title">All Cards <span style="color:var(--muted);font-size:1rem;font-weight:400;" id="manageTotalCount"></span></div>
    <div class="cards-list" id="cardsList"></div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Flashcard</h3>
    <div class="form-group" style="margin-bottom:1rem;">
      <label>Question</label>
      <textarea id="editQ" style="min-height:80px;"></textarea>
    </div>
    <div class="form-group">
      <label>Answer</label>
      <textarea id="editA" style="min-height:80px;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let cards = JSON.parse(localStorage.getItem('flashcards') || 'null') || [
  { id:1, q:"What is the capital of France?", a:"Paris" },
  { id:2, q:"What does HTML stand for?", a:"HyperText Markup Language" },
  { id:3, q:"What is 2² + 3²?", a:"13 (4 + 9)" },
  { id:4, q:"Who wrote 'Romeo and Juliet'?", a:"William Shakespeare" },
  { id:5, q:"What is the speed of light?", a:"~299,792,458 meters per second" },
];
let currentIdx = 0;
let known = 0, unknown = 0;
let isFlipped = false;
let editIdx = -1;

function save() { localStorage.setItem('flashcards', JSON.stringify(cards)); }

function updateStats() {
  document.getElementById('totalCount').textContent = cards.length;
  document.getElementById('sessionStat').textContent = `${known}/${cards.length}`;
  document.getElementById('manageTotalCount').textContent = `(${cards.length})`;
}

function renderCard() {
  if(cards.length === 0) {
    document.getElementById('questionText').textContent = 'No cards! Add some in Manage Cards.';
    document.getElementById('answerText').textContent = '—';
    document.getElementById('cardCounter').textContent = 'No cards';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }
  const c = cards[currentIdx];
  document.getElementById('questionText').textContent = c.q;
  document.getElementById('answerText').textContent = c.a;
  document.getElementById('cardCounter').textContent = `Card ${currentIdx+1} of ${cards.length}`;
  document.getElementById('progressFill').style.width = `${((currentIdx+1)/cards.length)*100}%`;
  // Reset flip
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  updateStats();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}
function showAnswer() {
  isFlipped = true;
  document.getElementById('flashcard').classList.add('flipped');
}
function nextCard() {
  if(currentIdx < cards.length-1) { currentIdx++; renderCard(); }
  else { showCompleted(); }
}
function prevCard() {
  if(currentIdx > 0) { currentIdx--; renderCard(); }
}
function markKnown() { known++; nextCard(); }
function markUnknown() { unknown++; nextCard(); }
function shuffleCards() {
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  currentIdx=0; known=0; unknown=0; renderCard();
}
function showCompleted() {
  document.getElementById('quizSection').querySelector('.flashcard-wrapper').style.display='none';
  document.querySelectorAll('.btn-row').forEach(r=>r.style.display='none');
  document.getElementById('completedMsg').style.display='block';
  document.getElementById('scoreMsg').textContent=`You knew ${known} out of ${cards.length} cards`;
}
function restartQuiz() {
  currentIdx=0; known=0; unknown=0;
  document.getElementById('quizSection').querySelector('.flashcard-wrapper').style.display='';
  document.querySelectorAll('.btn-row').forEach(r=>r.style.display='');
  document.getElementById('completedMsg').style.display='none';
  renderCard();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='quiz')||(i===1&&tab==='manage')));
  document.getElementById('quizSection').style.display = tab==='quiz'?'block':'none';
  document.getElementById('manageSection').style.display = tab==='manage'?'block':'none';
  if(tab==='manage') renderManage();
}

function addCard() {
  const q = document.getElementById('newQ').value.trim();
  const a = document.getElementById('newA').value.trim();
  if(!q||!a) return alert('Please fill in both question and answer.');
  cards.push({id:Date.now(),q,a});
  save(); renderManage(); updateStats();
  document.getElementById('newQ').value='';
  document.getElementById('newA').value='';
}

function renderManage() {
  const list = document.getElementById('cardsList');
  document.getElementById('manageTotalCount').textContent=`(${cards.length})`;
  if(cards.length===0){
    list.innerHTML=`<div class="empty-state"><span class="emoji">📭</span>No flashcards yet. Add one above!</div>`;
    return;
  }
  list.innerHTML = cards.map((c,i)=>`
    <div class="card-item">
      <div class="card-item-content">
        <div class="card-item-q">${escHtml(c.q)}</div>
        <div class="card-item-a">→ ${escHtml(c.a)}</div>
      </div>
      <div class="card-item-actions">
        <button class="icon-btn" onclick="openEdit(${i})">✏️ Edit</button>
        <button class="icon-btn del" onclick="deleteCard(${i})">🗑 Delete</button>
      </div>
    </div>`).join('');
}

function deleteCard(i) {
  if(!confirm('Delete this flashcard?')) return;
  cards.splice(i,1); save(); renderManage();
  if(currentIdx>=cards.length) currentIdx=Math.max(0,cards.length-1);
  renderCard();
}
function openEdit(i) {
  editIdx=i;
  document.getElementById('editQ').value=cards[i].q;
  document.getElementById('editA').value=cards[i].a;
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); }
function saveEdit() {
  const q=document.getElementById('editQ').value.trim();
  const a=document.getElementById('editA').value.trim();
  if(!q||!a) return alert('Both fields required.');
  cards[editIdx].q=q; cards[editIdx].a=a;
  save(); renderManage(); renderCard(); closeModal();
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderCard(); updateStats();
</script>
</body>
</html>
